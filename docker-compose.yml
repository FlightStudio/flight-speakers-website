services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: flight-speakers-db
    environment:
      POSTGRES_DB: flight_speakers
      POSTGRES_USER: flight_user
      POSTGRES_PASSWORD: flight_dev_password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql

volumes:
  pgdata:
