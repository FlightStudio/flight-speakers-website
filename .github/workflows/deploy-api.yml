name: Deploy API to Cloud Run

# Mirrors how Vercel auto-deploys the frontend: every push to main that touches
# the backend redeploys the Cloud Run API. Auth is keyless via Workload Identity
# Federation (no service-account JSON stored in the repo).

on:
  push:
    branches: [main]
    # Only redeploy when something the API image actually depends on changes.
    # Frontend-only changes (src/**, CSS) are Vercel's job and are skipped here.
    paths:
      - 'server/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

# Never let two deploys race; queue them instead of cancelling.
concurrency:
  group: deploy-api
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required to mint the OIDC token for WIF

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: steven-warehouse-dev
          # These are identifiers, not secrets — safe to keep in the workflow.
          workload_identity_provider: projects/30219985459/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: github-deploy@steven-warehouse-dev.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy flight-speakers-api \
            --source . \
            --region europe-west2 \
            --project steven-warehouse-dev \
            --quiet
